version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coloxi_postgres
    restart: always
    environment:
      POSTGRES_USER: coloxi_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: coloxi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
